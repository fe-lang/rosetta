[workspace]
name = "rosetta-fe"
version = "0.1.0"
members = ["examples/*/fe", "shared/*/fe"]
# poseidon excluded — triggers Sonatina stack allocator crash (pre-existing)
# merkle excluded — uses ArrayView which ABI generator doesn't map to uint256[32] yet
exclude = ["examples/poseidon/fe", "examples/merkle/fe"]
